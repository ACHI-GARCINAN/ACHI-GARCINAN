name: Build and Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Calculate Version
      id: version_calc
      run: |
        $runNumber = ${{ github.run_number }}
        $newVersion = $runNumber - 17
        echo "final_version=$newVersion" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Portable EXE
      run: |
        # פקודה מעודכנת שכוללת את כל הקבצים החדשים, תיקיית הווידג'טים ומסד הנתונים
        pyinstaller --onefile --windowed `
        --icon="icon.ico" `
        --name="Talmud-Formulas" `
        --add-data "widgets;widgets" `
        --add-data "talmud.db;." `
        --add-data "*.py;." `
        --add-data "*.json;." `
        main.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress

    - name: Build Installer
      run: |
        mkdir Output -ErrorAction SilentlyContinue
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "יצירת תוכנה.iss"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: 1.0.${{ steps.version_calc.outputs.final_version }}
        name: נוסחאות התלמוד גירסה 1.0.${{ steps.version_calc.outputs.final_version }}
        body: |
          גרסה אוטומטית של תוכנת נוסחאות התלמוד. כוללת את כל המסכתות במצב אופליין.
          
          ---
          ## להורדת גירסת ההתקנה Talmud-Formulas-Setup.exe לחצו על הקובץ
          ## להורדת גירסת ניידת Talmud-Formulas.exe - לחצו על הקובץ
        draft: false
        prerelease: false
        make_latest: true
        files: |
          dist/Talmud-Formulas.exe
          Output/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
