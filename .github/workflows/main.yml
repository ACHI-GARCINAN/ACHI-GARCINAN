name: Build and Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true 

    - name: Pull LFS objects
      run: git lfs pull 

    - name: Calculate Version
      id: version_calc
      run: |
        $runNumber = ${{ github.run_number }}
        # מכיוון שהריצה האחרונה הייתה 40, נחסיר 40 כדי לקבל 1.1
        $versionMinor = $runNumber - 40
        $finalVersion = "1.$versionMinor"
        echo "final_version=$finalVersion" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6

    - name: Build Portable EXE
      run: |
        pyinstaller --onefile --windowed `
        --icon="icon.ico" `
        --name="Talmud-Formulas" `
        --add-data "widgets;widgets" `
        --add-data "assets;assets" `
        --add-data "icon.ico;." `
        --add-data "talmud.db;." `
        --collect-all PyQt6 `
        --clean `
        main.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress

    - name: Build Installer
      run: |
        (Get-Content "יצירת תוכנה.iss") -replace 'AppVersion=.*', 'AppVersion=${{ steps.version_calc.outputs.final_version }}' | Set-Content "יצירת תוכנה.iss"
        mkdir Output -ErrorAction SilentlyContinue
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "יצירת תוכנה.iss"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version_calc.outputs.final_version }}
        name: גרסה ${{ steps.version_calc.outputs.final_version }}
        body: |
          שחרור גרסה אוטומטי ${{ steps.version_calc.outputs.final_version }}
        draft: false
        prerelease: false
        make_latest: true
        files: |
          dist/Talmud-Formulas.exe
          Output/Talmud-Formulas-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}