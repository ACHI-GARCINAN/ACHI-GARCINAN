name: Build and Release
on:
  push:
    branches: [ "main" ]
    # התעלמות מעדכוני אתר או מסמכים כדי לא להריץ סתם קימפול
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'index.html'
      - 'site/**' 
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true 

    - name: Pull LFS objects
      run: git lfs pull 

    # שלב חכם: מוצא מה הייתה הגרסה האחרונה ב-Releases
    - name: Get Latest Tag
      id: get_tag
      uses: oprypin/find-latest-tag@v1
      with:
        repository: ${{ github.repository }}
        releases-only: true
      continue-on-error: true # אם זה ה-Release הראשון אי פעם

    - name: Calculate Version
      id: version_calc
      shell: bash
      run: |
        # ברירת מחדל אם אין תגית קודמת
        LATEST_TAG="${{ steps.get_tag.outputs.tag }}"
        if [ -z "$LATEST_TAG" ]; then
          NEW_VERSION="1.8"
        else
          # לוקח את המספר אחרי הנקודה ומוסיף 1
          VERSION_MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | sed 's/v//')
          VERSION_MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          NEW_MINOR=$((VERSION_MINOR + 1))
          NEW_VERSION="$VERSION_MAJOR.$NEW_MINOR"
        fi
        echo "final_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon="icon.ico" --name="Talmudic-Formulas-Portable" --add-data "widgets;widgets" --add-data "assets;assets" --add-data "talmud.db;." --collect-all PyQt6 main.py
        pyinstaller --noconfirm --onedir --windowed --icon="icon.ico" --name="Talmudic-Formulas" --add-data "widgets;widgets" --add-data "assets;assets" --add-data "talmud.db;." --collect-all PyQt6 main.py
        (Get-Content "setup_script.iss") -replace 'AppVersion=.*', 'AppVersion=${{ steps.version_calc.outputs.final_version }}' | Set-Content "setup_script.iss"
        iscc "setup_script.iss"

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconfirm --windowed --name="Talmudic-Formulas-Mac" --add-data "widgets:widgets" --add-data "assets:assets" --add-data "talmud.db:." --collect-all PyQt6 main.py
        cd dist && zip -r ../Talmudic-Formulas-Mac-Portable.zip Talmudic-Formulas-Mac.app && cd ..
        mkdir dmg_root && cp -R "dist/Talmudic-Formulas-Mac.app" dmg_root/
        hdiutil create -volname "Talmudic Formulas" -srcfolder dmg_root -ov -format UDZO "Talmudic-Formulas-Mac-Installer.dmg"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ steps.version_calc.outputs.final_version }}
        name: גרסה ${{ steps.version_calc.outputs.final_version }}
        body: |
          ### וינדוס:
          * **גירסה ניידת (EXE)** - [לחץ כאן להורדה](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version_calc.outputs.final_version }}/Talmudic-Formulas-Portable.exe)
          * **גירסת התקנה (Setup)** - [לחץ כאן להורדה](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version_calc.outputs.final_version }}/Talmudic-Formulas-Setup-Win.exe)
          
          ### מק:
          * **גירסה ניידת (ZIP)** - [לחץ כאן להורדה](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version_calc.outputs.final_version }}/Talmudic-Formulas-Mac-Portable.zip)
          * **גירסת התקנה (DMG)** - [לחץ כאן להורדה](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version_calc.outputs.final_version }}/Talmudic-Formulas-Mac-Installer.dmg)
        files: |
          dist/Talmudic-Formulas-Portable.exe
          Output/Talmudic-Formulas-Setup-Win.exe
          Talmudic-Formulas-Mac-Portable.zip
          ./Talmudic-Formulas-Mac-Installer.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}