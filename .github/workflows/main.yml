name: Build and Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true 

    - name: Calculate Version
      id: version_calc
      run: |
        $runNumber = ${{ github.run_number }}
        $newVersion = $runNumber - 27
        echo "final_version=$newVersion" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6

    - name: Build Portable EXE
      run: |
        pyinstaller --onefile --windowed `
        --icon="icon.ico" `
        --name="Talmud-Formulas" `
        --add-data "widgets;widgets" `
        --add-data "talmud.db;." `
        --add-data "icon.ico;." `
        --collect-all PyQt6 `
        --clean `
        main.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress

    - name: Build Installer
      run: |
        mkdir Output -ErrorAction SilentlyContinue
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "יצירת תוכנה.iss"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: 1.${{ steps.version_calc.outputs.final_version }}
        name: נוסחאות התלמוד גירסה 1.${{ steps.version_calc.outputs.final_version }}
        body: |
          ### 🚀 שחרור גרסה 1.${{ steps.version_calc.outputs.final_version }}
          
          **תיקונים בגרסה זו:**
          * הוספת ספריות PyQt6 חסרות לגרסה הניידת.
          * תיקון נתיבי גישה למסד הנתונים (talmud.db).
          * שיפור יציבות במערכות Windows 10/11.
          
          ---
          ###  הורדה:
          *  [**גרסת התקנה (Setup)**](https://github.com/${{ github.repository }}/releases/download/1.${{ steps.version_calc.outputs.final_version }}/Talmud-Formulas-Setup.exe) - מומלץ! כולל אייקון בשולחן העבודה.
          *  [**גרסה ניידת (Portable)**](https://github.com/${{ github.repository }}/releases/download/1.${{ steps.version_calc.outputs.final_version }}/Talmud-Formulas.exe) - להרצה ללא התקנה.
          
          ---
          _הערה: אם האנטי-וירוס מתריע, יש לאשר את ההרצה (זה קורה בגלל שהקובץ אינו חתום דיגיטלית)._
        draft: false
        prerelease: false
        make_latest: true
        files: |
          dist/Talmud-Formulas.exe
          Output/Talmud-Formulas-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}