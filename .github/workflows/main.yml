name: Build and Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true # מוריד את קובץ ה-talmud.db האמיתי מה-LFS

    - name: Calculate Version
      id: version_calc
      run: |
        $runNumber = ${{ github.run_number }}
        # הפחתה של 27 תביא אותנו לגרסה 3 (כלומר 1.3)
        $newVersion = $runNumber - 27
        echo "final_version=$newVersion" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install pyinstaller

    - name: Build Portable EXE
      run: |
        pyinstaller --onefile --windowed `
        --icon="icon.ico" `
        --name="Talmud-Formulas" `
        --add-data "widgets;widgets" `
        --add-data "talmud.db;." `
        --add-data "*.py;." `
        main.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress

    - name: Build Installer
      run: |
        mkdir Output -ErrorAction SilentlyContinue
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "יצירת תוכנה.iss"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        # יצירת תגית בפורמט 1.3 במקום 1.0.13
        tag_name: 1.${{ steps.version_calc.outputs.final_version }}
        name: נוסחאות התלמוד גירסה 1.${{ steps.version_calc.outputs.final_version }}
        body: |
          גרסה אוטומטית של תוכנת נוסחאות התלמוד. כוללת את כל המסכתות במצב אופליין.
          
          ---
          
          ###  להורדה ישירה:
          *  [לחצו כאן להורדת גירסת ההתקנה - Talmud-Formulas-Setup.exe](https://github.com/${{ github.repository }}/releases/download/1.${{ steps.version_calc.outputs.final_version }}/Talmud-Formulas-Setup.exe)
          *  [לחצו כאן להורדת גירסה ניידת - Talmud-Formulas.exe](https://github.com/${{ github.repository }}/releases/download/1.${{ steps.version_calc.outputs.final_version }}/Talmud-Formulas.exe)
          
          ---
          _הערה: אם ההורדה נחסמת על ידי הדפדפן, יש לבחור ב-"שמור" (Keep)._
        draft: false
        prerelease: false
        make_latest: true
        files: |
          dist/Talmud-Formulas.exe
          Output/Talmud-Formulas-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}