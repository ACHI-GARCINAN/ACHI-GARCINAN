name: Build and Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Portable EXE
      run: |
        pyinstaller --onefile --windowed --icon="icon.ico" --name="Talmud-Formulas" --add-data "*.json;." synopsis_viewer-13.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress

    - name: Build Installer
      run: |
        mkdir Output -ErrorAction SilentlyContinue
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "יצירת תוכנה.iss"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        # יצירת גרסה ייחודית בכל פעם (למשל v1.0.18, v1.0.19)
        tag_name: v1.0.${{ github.run_number }}
        name: גרסה 1.0.${{ github.run_number }}
        body: |
          **עדכון אוטומטי - גרסה 1.0.${{ github.run_number }}**
          
          שינויים אחרונים בגרסה זו:
          * עדכון נוסחאות ומסכתות
          * בנייה אוטומטית של קובץ התקנה (Setup) וקובץ נייד (Portable)
        draft: false
        prerelease: false
        files: |
          dist/Talmud-Formulas.exe
          Output/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
