name: Build and Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Portable EXE
      run: |
        pyinstaller --onefile --windowed --icon="icon.ico" --name="Talmud-Formulas" --add-data "*.json;." synopsis_viewer-13.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress

    - name: Build Installer
      run: |
        mkdir Output -ErrorAction SilentlyContinue
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "יצירת תוכנה.iss"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        # כאן אנחנו מבצעים את ה"איפוס": המונה הנוכחי פחות 17
        # כך שהריצה הבאה (18) תהיה גרסה 1.1
        tag_name: 1.${{ github.run_number - 17 }}
        name: גרסה 1.${{ github.run_number - 17 }}
        body: |
          **גרסה 1.${{ github.run_number - 17 }}**
          עדכון אוטומטי של המערכת.
        draft: false
        prerelease: false
        files: |
          dist/Talmud-Formulas.exe
          Output/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
