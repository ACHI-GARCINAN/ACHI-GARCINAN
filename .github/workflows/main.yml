name: Build and Release
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'

jobs:
  build:
    runs-on: windows-latest
    # זה החלק שמוודא ש-GitHub ייתן לריצה הזו רשות לכתוב ריליס
    permissions:
      contents: write
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Portable EXE
      run: |
        pyinstaller --onefile --windowed --icon="icon.ico" --name="Talmud-Formulas" --add-data "*.json;." synopsis_viewer-13.py

    - name: Install Inno Setup
      run: choco install innosetup --no-progress

    - name: Build Installer
      run: |
        mkdir Output -ErrorAction SilentlyContinue
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "יצירת תוכנה.iss"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${\{ github.run_number \}\}
        name: גרסה חדשה - v${\{ github.run_number \}\}
        body: |
          **גרסה ראשונה של תוכנת נוסחאות התלמוד. כוללת את כל המסכתות במצב אופליין**
          
          ## להורדת גרסת ההתקנה לחצו על הקובץ Talmud-Formulas-Setup.exe למטה
          ## להורדת גרסה ניידת - לחצו על הקובץ Talmud-Formulas.exe למטה
        files: |
          dist/Talmud-Formulas.exe
          Output/*.exe
      env:
        GITHUB_TOKEN: ${\{ secrets.GITHUB_TOKEN \}\}
