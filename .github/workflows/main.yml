name: Build and Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Calculate Version
      id: get_version
      shell: bash
      run: |
        # מוצא את התג האחרון (למשל v1.12) ומקדם אותו ל-v1.13
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0")
        VERSION_MINOR=$(echo $LATEST_TAG | cut -d. -f2)
        NEW_MINOR=$((VERSION_MINOR + 1))
        NEW_TAG="v1.$NEW_MINOR"
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: pip install pyinstaller PyQt6 gdown macholib

    - name: Download DB from Google Drive
      shell: bash
      run: gdown --id "1_jWI2qNMSyBkH3EneM2mZg-Wzibn_gLw" -O talmud.db

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        choco install innosetup --no-progress
        # גרסה ניידת
        pyinstaller --noconfirm --onefile --windowed --icon="icon.ico" --name="Talmudic-Formulas-Portable" --add-data "talmud.db;." --add-data "widgets;widgets" --add-data "assets;assets" --collect-all PyQt6 --distpath ./dist-portable main.py
        # גרסה להתקנה
        pyinstaller --noconfirm --onedir --windowed --icon="icon.ico" --name="Talmudic-Formulas" --add-data "talmud.db;." --add-data "widgets;widgets" --add-data "assets;assets" --collect-all PyQt6 --distpath ./dist-installer main.py
        
        $iss = Get-Content "setup_script.iss" -Raw
        $iss = $iss -replace 'Source: "dist\\Talmudic-Formulas\\\*"', 'Source: "dist-installer\\Talmudic-Formulas\\*"'
        $Utf8WithBom = New-Object System.Text.UTF8Encoding($true)
        [System.IO.File]::WriteAllText("setup_script.iss", $iss, $Utf8WithBom)
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup_script.iss"

    - name: Build macOS (Universal2)
      if: matrix.os == 'macos-latest'
      run: |
        # בנייה עבור אינטל וסיליקון במקביל
        pyinstaller --noconfirm --windowed --target-arch universal2 --name="Talmudic-Formulas-Mac" --add-data "talmud.db:." --add-data "widgets:widgets" --add-data "assets:assets" --collect-all PyQt6 main.py
        cd dist && zip -r ../Talmudic-Formulas-Mac-Portable.zip Talmudic-Formulas-Mac.app && cd ..
        mkdir dmg_root && cp -R "dist/Talmudic-Formulas-Mac.app" dmg_root/
        hdiutil create -volname "Talmudic Formulas" -srcfolder dmg_root -ov -format UDZO "Talmudic-Formulas-Mac-Installer.dmg"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.new_tag }}
        name: גרסה ${{ steps.get_version.outputs.new_tag }}
        body: |
          ## קישורים להורדה ישירה:
          
          ###  Windows
          * [הורדת מתקין (Windows Setup)](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.new_tag }}/Talmudic-Formulas-Setup-Win.exe)
          * [הורדת גרסה ניידת (Windows Portable EXE)](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.new_tag }}/Talmudic-Formulas-Portable.exe)
          
          ###  macOS (Universal - Intel & Silicon)
          * [הורדת מתקין (macOS DMG)](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.new_tag }}/Talmudic-Formulas-Mac-Installer.dmg)
          * [הורדת גרסה ניידת (macOS ZIP)](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.new_tag }}/Talmudic-Formulas-Mac-Portable.zip)
        files: |
          dist-portable/Talmudic-Formulas-Portable.exe
          Output/Talmudic-Formulas-Setup-Win.exe
          Talmudic-Formulas-Mac-Portable.zip
          ./Talmudic-Formulas-Mac-Installer.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}