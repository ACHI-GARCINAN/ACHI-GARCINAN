name: Build and Release
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'index.html'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true 

    - name: Pull LFS objects
      run: git lfs pull 

    - name: Calculate Version
      id: version_calc
      shell: bash
      run: |
        RUN_NUMBER=${{ github.run_number }}
        VERSION_MINOR=$((RUN_NUMBER - 46))
        echo "final_version=1.$VERSION_MINOR" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        # בניית קבצי ה-EXE
        pyinstaller --noconfirm --onefile --windowed --icon="icon.ico" --name="Talmudic-Formulas-Portable" --add-data "widgets;widgets" --add-data "assets;assets" --add-data "talmud.db;." --collect-all PyQt6 main.py
        pyinstaller --noconfirm --onedir --windowed --icon="icon.ico" --name="Talmudic-Formulas" --add-data "widgets;widgets" --add-data "assets;assets" --add-data "talmud.db;." --collect-all PyQt6 main.py
        
        # הרצת Inno Setup עם השם החדש והבאנגלית
        choco install innosetup --no-progress
        (Get-Content "setup_script.iss") -replace 'AppVersion=.*', 'AppVersion=${{ steps.version_calc.outputs.final_version }}' | Set-Content "setup_script.iss"
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup_script.iss"

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconfirm --windowed --name="Talmudic-Formulas-Mac" --add-data "widgets:widgets" --add-data "assets:assets" --add-data "talmud.db:." --collect-all PyQt6 main.py
        cd dist
        zip -r ../Talmudic-Formulas-Mac-Portable.zip Talmudic-Formulas-Mac.app
        cd ..
        mkdir dmg_root
        cp -R "dist/Talmudic-Formulas-Mac.app" dmg_root/
        hdiutil create -volname "Talmudic Formulas" -srcfolder dmg_root -ov -format UDZO "Talmudic-Formulas-Mac-Installer.dmg"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ steps.version_calc.outputs.final_version }}
        name: גרסה ${{ steps.version_calc.outputs.final_version }}
        files: |
          dist/Talmudic-Formulas-Portable.exe
          Output/Talmudic-Formulas-Setup-Win.exe
          Talmudic-Formulas-Mac-Portable.zip
          ./Talmudic-Formulas-Mac-Installer.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}